<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTATE PRO v47.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-900 text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <h1 class="text-3xl font-bold text-indigo-400 mb-2">ESTATE PRO v47.0</h1>
        
        <div class="flex flex-wrap gap-3 mb-6">
            <button onclick="loadData()" class="bg-indigo-600 px-4 py-2 rounded-lg font-semibold text-sm">🔄 載入資料</button>
            <button onclick="clearAll()" class="bg-red-600 px-4 py-2 rounded-lg font-semibold text-sm">🗑️ 清除</button>
        </div>

        <!-- Filters -->
        <div class="bg-slate-800 rounded-xl p-6 mb-6">
            <h3 class="text-lg font-bold text-indigo-400 mb-4">📊 篩選</h3>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div><label class="block text-sm font-semibold mb-2">區域</label><select id="districtFilter" multiple size="4" class="w-full bg-slate-700 rounded-lg px-3 py-2 text-sm"></select></div>
                <div><label class="block text-sm font-semibold mb-2">房型</label><select id="roomFilter" class="w-full bg-slate-700 rounded-lg px-3 py-2 text-sm"><option value="">全部</option><option value="1">1房</option><option value="2">2房</option><option value="3">3房</option><option value="4">4房+</option></select></div>
                <div><label class="block text-sm font-semibold mb-2">開始</label><input type="text" id="dateStart" placeholder="2023-01" class="w-full bg-slate-700 rounded-lg px-3 py-2 text-sm"></div>
                <div><label class="block text-sm font-semibold mb-2">結束</label><input type="text" id="dateEnd" placeholder="2024-12" class="w-full bg-slate-700 rounded-lg px-3 py-2 text-sm"></div>
                <div class="flex items-end"><button onclick="applyFilters()" class="w-full bg-indigo-600 px-6 py-2 rounded-lg font-semibold text-sm">套用</button></div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mb-6 border-b border-slate-700">
            <button onclick="switchTab('presale')" id="tabPresale" class="px-6 py-3 font-semibold rounded-t-lg bg-indigo-600">預售屋</button>
            <button onclick="switchTab('resale')" id="tabResale" class="px-6 py-3 font-semibold rounded-t-lg bg-slate-800 text-gray-400">中古屋</button>
        </div>

        <!-- Presale -->
        <div id="contentPresale">
            <div class="bg-gradient-to-r from-purple-900 to-indigo-900 rounded-xl p-6 mb-6"><div id="summaryPresale" class="text-gray-200 text-sm"></div></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-slate-800 rounded-xl p-6"><canvas id="volumePresale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6"><canvas id="pricePresale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6" id="piePresaleDiv"><canvas id="piePresale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6" id="barPresaleDiv"><canvas id="barPresale"></canvas></div>
            </div>
            <div class="mb-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-slate-800 rounded-xl p-4"><h3 class="text-sm font-bold text-yellow-400 mb-2">💰 均價 by 區域</h3><div id="top1Presale" class="text-xs space-y-2"></div></div>
                    <div class="bg-slate-800 rounded-xl p-4"><h3 class="text-sm font-bold text-green-400 mb-2">🔥 成交數 by 區域</h3><div id="top2Presale" class="text-xs space-y-2"></div></div>
                    <div class="bg-slate-800 rounded-xl p-4"><h3 class="text-sm font-bold text-purple-400 mb-2">💎 最高總價物件</h3><div id="top3Presale" class="text-xs space-y-2"></div></div>
                    <div class="bg-slate-800 rounded-xl p-4"><h3 class="text-sm font-bold text-blue-400 mb-2">📈 最高量建案</h3><div id="top4Presale" class="text-xs space-y-2"></div></div>
                </div>
            </div>
        </div>

        <!-- Resale -->
        <div id="contentResale" style="display:none;">
            <div class="bg-gradient-to-r from-purple-900 to-indigo-900 rounded-xl p-6 mb-6"><div id="summaryResale" class="text-gray-200 text-sm"></div></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-slate-800 rounded-xl p-6"><canvas id="volumeResale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6"><canvas id="priceResale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6" id="pieResaleDiv"><canvas id="pieResale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6" id="barResaleDiv"><canvas id="barResale"></canvas></div>
            </div>
            <div class="mb-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-slate-800 rounded-xl p-4"><h3 class="text-sm font-bold text-yellow-400 mb-2">💰 均價 by 區域</h3><div id="top1Resale" class="text-xs space-y-2"></div></div>
                    <div class="bg-slate-800 rounded-xl p-4"><h3 class="text-sm font-bold text-green-400 mb-2">🔥 成交數 by 區域</h3><div id="top2Resale" class="text-xs space-y-2"></div></div>
                    <div class="bg-slate-800 rounded-xl p-4"><h3 class="text-sm font-bold text-purple-400 mb-2">💎 最高總價物件</h3><div id="top3Resale" class="text-xs space-y-2"></div></div>
                    <div class="bg-slate-800 rounded-xl p-4"><h3 class="text-sm font-bold text-blue-400 mb-2">📈 最高量社區</h3><div id="top4Resale" class="text-xs space-y-2"></div></div>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl p-4 text-center text-xs text-gray-400"><div id="dataInfo"></div></div>
        <div id="status" class="mt-4 text-center text-sm text-indigo-400"></div>
    </div>

    <script>
        let presaleData = [], resaleData = [], filteredPresale = [], filteredResale = [], charts = {};

        function rocToIso(roc) {
            if (!roc || roc.length < 6) return '';
            const yy = parseInt(roc.substring(0, 3));
            const mm = roc.substring(3, 5);
            return `${yy + 1911}-${mm}`;
        }

        function parsePresale(row) {
            if (!row.rps12 || !row.rps12.includes('住家用')) return null;
            const p = parseFloat(row.rps21_amountsunitdollars) || 0;
            if (!p) return null;
            const r = parseInt(row.rps16_quantity) || 0;
            if (!r) return null;
            const dateRoc = row.rps07 || '';
            if (!dateRoc) return null;
            const dateIso = rocToIso(dateRoc);
            if (!dateIso) return null;
            return {
                uid: `P_${row.rps26 || Math.random()}`,
                district: row.district || '',
                date: dateIso,
                price: p / 10000,
                rooms: r,
                projectName: row.rps28 ? row.rps28.trim() : '未命名'
            };
        }

        function parseResale(row) {
            if (!row.rps12 || !row.rps12.includes('住家用')) return null;
            const p = parseFloat(row.rps21_amountsunitdollars) || 0;
            if (!p) return null;
            const r = parseInt(row.rps16_quantity) || 0;
            if (!r) return null;
            const dateRoc = row.rps07_yyymmddroc || '';
            if (!dateRoc) return null;
            const dateIso = rocToIso(dateRoc);
            if (!dateIso) return null;
            const addr = row.rps02 ? row.rps02.trim() : '';
            return {
                uid: `R_${row.rps26 || Math.random()}`,
                district: row.district || '',
                date: dateIso,
                price: p / 10000,
                rooms: r,
                address: addr
            };
        }

        async function fetchCSV(url) {
            const resp = await fetch(url);
            const text = await resp.text();
            return new Promise((r) => {
                Papa.parse(text, {
                    header: true,
                    skipEmptyLines: true,
                    encoding: 'UTF-8',
                    complete: (res) => r(res.data)
                });
            });
        }

        async function loadData() {
            try {
                setStatus('🔄 載入中...');
                const [p, r] = await Promise.all([
                    fetchCSV('https://raw.githubusercontent.com/pickymiao/estate_dashboard/main/presale.csv'),
                    fetchCSV('https://raw.githubusercontent.com/pickymiao/estate_dashboard/main/resale.csv')
                ]);
                console.log('原始:', p.length, r.length);
                
                presaleData = p.map(parsePresale).filter(x => x);
                resaleData = r.map(parseResale).filter(x => x);
                console.log('解析:', presaleData.length, resaleData.length);
                
                populateFilters();
                applyFilters();
                setStatus(`✅ 載入完成 - 預售${presaleData.length}/中古${resaleData.length}`);
            } catch (e) {
                console.error(e);
                setStatus('❌ ' + e.message);
            }
        }

        function populateFilters() {
            const districts = [...new Set([...presaleData.map(x => x.district), ...resaleData.map(x => x.district)])].sort();
            document.getElementById('districtFilter').innerHTML = districts.map(d => `<option value="${d}">${d}</option>`).join('');
        }

        function switchTab(tab) {
            document.getElementById('contentPresale').style.display = tab === 'presale' ? 'block' : 'none';
            document.getElementById('contentResale').style.display = tab === 'resale' ? 'block' : 'none';
            document.getElementById('tabPresale').className = `px-6 py-3 font-semibold rounded-t-lg ${tab === 'presale' ? 'bg-indigo-600' : 'bg-slate-800 text-gray-400'}`;
            document.getElementById('tabResale').className = `px-6 py-3 font-semibold rounded-t-lg ${tab === 'resale' ? 'bg-indigo-600' : 'bg-slate-800 text-gray-400'}`;
        }

        function applyFilters() {
            const districts = Array.from(document.getElementById('districtFilter').selectedOptions).map(o => o.value);
            const room = document.getElementById('roomFilter').value;
            const ds = document.getElementById('dateStart').value;
            const de = document.getElementById('dateEnd').value;

            filteredPresale = presaleData.filter(x => {
                if (districts.length && !districts.includes(x.district)) return false;
                if (room && x.rooms != room && !(room == '4' && x.rooms >= 4)) return false;
                if (ds && x.date < ds) return false;
                if (de && x.date > de) return false;
                return true;
            });

            filteredResale = resaleData.filter(x => {
                if (districts.length && !districts.includes(x.district)) return false;
                if (room && x.rooms != room && !(room == '4' && x.rooms >= 4)) return false;
                if (ds && x.date < ds) return false;
                if (de && x.date > de) return false;
                return true;
            });

            renderPresale();
            renderResale();
            updateDataInfo();
            setStatus(`✅ 預售${filteredPresale.length}/中古${filteredResale.length}`);
        }

        function renderPresale() {
            if (!filteredPresale.length) {
                document.getElementById('summaryPresale').innerHTML = '無數據';
                return;
            }

            const md = {};
            filteredPresale.forEach(x => {
                const m = x.date.substring(0, 7);
                if (!md[m]) md[m] = { c: 0, s: 0 };
                md[m].c++;
                md[m].s += x.price;
            });
            const months = Object.keys(md).sort();

            // 銷售量
            const ctx1 = document.getElementById('volumePresale');
            if (charts.vp) charts.vp.destroy();
            charts.vp = new Chart(ctx1, {
                type: 'line',
                data: { labels: months, datasets: [{ label: '成交', data: months.map(m => md[m].c), borderColor: '#818cf8', fill: false, tension: 0.3 }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            // 均價
            const ctx2 = document.getElementById('pricePresale');
            if (charts.pp) charts.pp.destroy();
            charts.pp = new Chart(ctx2, {
                type: 'line',
                data: { labels: months, datasets: [{ label: '均價', data: months.map(m => (md[m].s / md[m].c).toFixed(0)), borderColor: '#f59e0b', fill: false, tension: 0.3 }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            const dist = [...new Set(filteredPresale.map(x => x.district))];
            if (dist.length > 1) {
                const dv = {};
                filteredPresale.forEach(x => dv[x.district] = (dv[x.district] || 0) + 1);
                const s1 = Object.entries(dv).sort((a, b) => b[1] - a[1]);
                const ctx3 = document.getElementById('piePresale');
                if (charts.piep) charts.piep.destroy();
                charts.piep = new Chart(ctx3, {
                    type: 'pie',
                    data: { labels: s1.map(x => x[0]), datasets: [{ data: s1.map(x => x[1]), backgroundColor: ['#818cf8', '#34d399', '#f59e0b', '#ef4444', '#8b5cf6'] }] },
                    options: { responsive: true }
                });

                const ds = {};
                filteredPresale.forEach(x => {
                    if (!ds[x.district]) ds[x.district] = { s: 0, c: 0 };
                    ds[x.district].s += x.price;
                    ds[x.district].c++;
                });
                const s2 = Object.entries(ds).map(([d, s]) => ({ d, a: (s.s / s.c).toFixed(0) })).sort((a, b) => b.a - a.a);
                const ctx4 = document.getElementById('barPresale');
                if (charts.bp) charts.bp.destroy();
                charts.bp = new Chart(ctx4, {
                    type: 'bar',
                    data: { labels: s2.map(x => x.d), datasets: [{ label: '均價', data: s2.map(x => x.a), backgroundColor: '#818cf8' }] },
                    options: { responsive: true, plugins: { legend: { display: false } } }
                });
            }

            const ap = (filteredPresale.reduce((s, x) => s + x.price, 0) / filteredPresale.length).toFixed(0);
            document.getElementById('summaryPresale').innerHTML = `共<strong>${filteredPresale.length}</strong>筆｜均價<strong>${ap}萬</strong>`;

            const dprice = {};
            filteredPresale.forEach(x => {
                if (!dprice[x.district]) dprice[x.district] = [];
                dprice[x.district].push(x.price);
            });
            const t1 = Object.entries(dprice).map(([d, arr]) => ({ d, a: Math.round(arr.reduce((s, v) => s + v) / arr.length) })).sort((a, b) => b.a - a.a).slice(0, 5);
            document.getElementById('top1Presale').innerHTML = t1.map((x, i) => `<div class="p-2 bg-slate-700 rounded">${i + 1}. ${x.d}<br/><span class="text-yellow-300">${x.a}萬</span></div>`).join('') || '無';

            const dvol = {};
            filteredPresale.forEach(x => dvol[x.district] = (dvol[x.district] || 0) + 1);
            const t2 = Object.entries(dvol).sort((a, b) => b[1] - a[1]).slice(0, 5);
            document.getElementById('top2Presale').innerHTML = t2.map((x, i) => `<div class="p-2 bg-slate-700 rounded">${i + 1}. ${x[0]}<br/><span class="text-green-300">${x[1]}筆</span></div>`).join('') || '無';

            const t3 = [...filteredPresale].sort((a, b) => b.price - a.price).slice(0, 5);
            document.getElementById('top3Presale').innerHTML = t3.map((x, i) => `<div class="p-2 bg-slate-700 rounded">${i + 1}. ${x.projectName}<br/><span class="text-purple-300">${x.price.toFixed(0)}萬</span><br/><small class="text-gray-400">${x.rooms}房</small></div>`).join('') || '無';

            const pn = {};
            filteredPresale.filter(x => x.projectName !== '未命名').forEach(x => pn[x.projectName] = (pn[x.projectName] || 0) + 1);
            const t4 = Object.entries(pn).sort((a, b) => b[1] - a[1]).slice(0, 5);
            document.getElementById('top4Presale').innerHTML = t4.map((x, i) => `<div class="p-2 bg-slate-700 rounded">${i + 1}. ${x[0]}<br/><span class="text-blue-300">${x[1]}筆</span></div>`).join('') || '無';
        }

        function renderResale() {
            if (!filteredResale.length) {
                document.getElementById('summaryResale').innerHTML = '無數據';
                return;
            }

            const md = {};
            filteredResale.forEach(x => {
                const m = x.date.substring(0, 7);
                if (!md[m]) md[m] = { c: 0, s: 0 };
                md[m].c++;
                md[m].s += x.price;
            });
            const months = Object.keys(md).sort();

            const ctx1 = document.getElementById('volumeResale');
            if (charts.vr) charts.vr.destroy();
            charts.vr = new Chart(ctx1, {
                type: 'line',
                data: { labels: months, datasets: [{ label: '成交', data: months.map(m => md[m].c), borderColor: '#34d399', fill: false, tension: 0.3 }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            const ctx2 = document.getElementById('priceResale');
            if (charts.pr) charts.pr.destroy();
            charts.pr = new Chart(ctx2, {
                type: 'line',
                data: { labels: months, datasets: [{ label: '均價', data: months.map(m => (md[m].s / md[m].c).toFixed(0)), borderColor: '#10b981', fill: false, tension: 0.3 }] },
                options: { responsive: true, plugins: { legend: { display: false } } }
            });

            const dist = [...new Set(filteredResale.map(x => x.district))];
            if (dist.length > 1) {
                const dv = {};
                filteredResale.forEach(x => dv[x.district] = (dv[x.district] || 0) + 1);
                const s1 = Object.entries(dv).sort((a, b) => b[1] - a[1]);
                const ctx3 = document.getElementById('pieResale');
                if (charts.pier) charts.pier.destroy();
                charts.pier = new Chart(ctx3, {
                    type: 'pie',
                    data: { labels: s1.map(x => x[0]), datasets: [{ data: s1.map(x => x[1]), backgroundColor: ['#818cf8', '#34d399', '#f59e0b', '#ef4444', '#8b5cf6'] }] },
                    options: { responsive: true }
                });

                const ds = {};
                filteredResale.forEach(x => {
                    if (!ds[x.district]) ds[x.district] = { s: 0, c: 0 };
                    ds[x.district].s += x.price;
                    ds[x.district].c++;
                });
                const s2 = Object.entries(ds).map(([d, s]) => ({ d, a: (s.s / s.c).toFixed(0) })).sort((a, b) => b.a - a.a);
                const ctx4 = document.getElementById('barResale');
                if (charts.br) charts.br.destroy();
                charts.br = new Chart(ctx4, {
                    type: 'bar',
                    data: { labels: s2.map(x => x.d), datasets: [{ label: '均價', data: s2.map(x => x.a), backgroundColor: '#34d399' }] },
                    options: { responsive: true, plugins: { legend: { display: false } } }
                });
            }

            const ap = (filteredResale.reduce((s, x) => s + x.price, 0) / filteredResale.length).toFixed(0);
            document.getElementById('summaryResale').innerHTML = `共<strong>${filteredResale.length}</strong>筆｜均價<strong>${ap}萬</strong>`;

            const dprice = {};
            filteredResale.forEach(x => {
                if (!dprice[x.district]) dprice[x.district] = [];
                dprice[x.district].push(x.price);
            });
            const t1 = Object.entries(dprice).map(([d, arr]) => ({ d, a: Math.round(arr.reduce((s, v) => s + v) / arr.length) })).sort((a, b) => b.a - a.a).slice(0, 5);
            document.getElementById('top1Resale').innerHTML = t1.map((x, i) => `<div class="p-2 bg-slate-700 rounded">${i + 1}. ${x.d}<br/><span class="text-yellow-300">${x.a}萬</span></div>`).join('') || '無';

            const dvol = {};
            filteredResale.forEach(x => dvol[x.district] = (dvol[x.district] || 0) + 1);
            const t2 = Object.entries(dvol).sort((a, b) => b[1] - a[1]).slice(0, 5);
            document.getElementById('top2Resale').innerHTML = t2.map((x, i) => `<div class="p-2 bg-slate-700 rounded">${i + 1}. ${x[0]}<br/><span class="text-green-300">${x[1]}筆</span></div>`).join('') || '無';

            const t3 = [...filteredResale].sort((a, b) => b.price - a.price).slice(0, 5);
            document.getElementById('top3Resale').innerHTML = t3.map((x, i) => `<div class="p-2 bg-slate-700 rounded">${i + 1}. ${x.address.substring(0, 15)}<br/><span class="text-purple-300">${x.price.toFixed(0)}萬</span><br/><small class="text-gray-400">${x.rooms}房</small></div>`).join('') || '無';

            const cn = {};
            filteredResale.forEach(x => {
                const key = x.address.substring(0, 20);
                cn[key] = (cn[key] || 0) + 1;
            });
            const t4 = Object.entries(cn).sort((a, b) => b[1] - a[1]).slice(0, 5);
            document.getElementById('top4Resale').innerHTML = t4.map((x, i) => `<div class="p-2 bg-slate-700 rounded">${i + 1}. ${x[0]}<br/><span class="text-blue-300">${x[1]}筆</span></div>`).join('') || '無';
        }

        function updateDataInfo() {
            if (!presaleData.length && !resaleData.length) return;
            const all = [...presaleData.map(x => x.date), ...resaleData.map(x => x.date)].filter(x => x).sort();
            const now = new Date().toLocaleString('zh-TW');
            document.getElementById('dataInfo').innerHTML = `📅 ${all[0]}~${all[all.length - 1]} ｜ 🔄 ${now} ｜ 📊 預售${presaleData.length}/中古${resaleData.length}`;
        }

        function clearAll() {
            presaleData = [];
            resaleData = [];
            filteredPresale = [];
            filteredResale = [];
            document.getElementById('districtFilter').innerHTML = '';
            setStatus('✅ 已清除');
        }

        function setStatus(msg) {
            document.getElementById('status').textContent = msg;
        }

        window.addEventListener('load', () => {
            setStatus('按下方「載入資料」開始');
        });
    </script>
</body>
</html>
