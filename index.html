<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTATE PRO v46.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-900 text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-indigo-400 mb-4">ESTATE PRO v46.0</h1>
            <div class="flex flex-wrap gap-3">
                <button onclick="syncData()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg font-semibold">🔄 同步 GitHub 數據</button>
                <label class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg font-semibold cursor-pointer">📁 上傳 CSV<input type="file" id="fileInput" accept=".csv" multiple class="hidden"></label>
                <button onclick="clearData()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg font-semibold">🗑️ 清除資料</button>
            </div>
        </div>

        <!-- Global Filters -->
        <div class="bg-slate-800 rounded-xl p-6 mb-6 shadow-xl">
            <h3 class="text-lg font-bold text-indigo-400 mb-4">📊 全域篩選條件</h3>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <div><label class="block text-sm font-semibold mb-2">區域 (可多選)</label><select id="districtFilter" multiple size="5" class="w-full bg-slate-700 rounded-lg px-3 py-2"></select></div>
                <div><label class="block text-sm font-semibold mb-2">房型</label><select id="roomFilter" class="w-full bg-slate-700 rounded-lg px-3 py-2"><option value="">全部</option><option value="1">1房</option><option value="2">2房</option><option value="3">3房</option><option value="4">4房+</option></select></div>
                <div><label class="block text-sm font-semibold mb-2">開始日期</label><input type="month" id="dateStart" class="w-full bg-slate-700 rounded-lg px-3 py-2"></div>
                <div><label class="block text-sm font-semibold mb-2">結束日期</label><input type="month" id="dateEnd" class="w-full bg-slate-700 rounded-lg px-3 py-2"></div>
                <div class="flex items-end"><button onclick="applyGlobalFilters()" class="w-full bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded-lg font-semibold">套用篩選</button></div>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div class="flex gap-2 mb-6 border-b border-slate-700">
            <button onclick="switchTab('presale')" id="tabPresale" class="px-6 py-3 font-semibold rounded-t-lg bg-indigo-600 text-white">預售屋</button>
            <button onclick="switchTab('resale')" id="tabResale" class="px-6 py-3 font-semibold rounded-t-lg bg-slate-800 text-gray-400">中古屋</button>
        </div>

        <!-- Presale Tab -->
        <div id="contentPresale">
            <div class="bg-gradient-to-r from-purple-900 to-indigo-900 rounded-xl p-6 mb-6"><h2 class="text-2xl font-bold text-purple-300 mb-3">🤖 AI 市場分析</h2><div id="aiAnalysisPresale" class="text-gray-200"></div></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-slate-800 rounded-xl p-6"><h3 class="text-xl font-bold text-indigo-400 mb-4">📊 銷售量趨勢</h3><canvas id="volumeChartPresale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6"><h3 class="text-xl font-bold text-indigo-400 mb-4">💰 均價趨勢</h3><canvas id="priceChartPresale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6" id="piePresale"><h3 class="text-xl font-bold text-indigo-400 mb-4">🥧 區域佔比</h3><canvas id="pieChartPresale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6" id="barPresale"><h3 class="text-xl font-bold text-indigo-400 mb-4">📊 區域均價</h3><canvas id="barChartPresale"></canvas></div>
            </div>
            <div class="mb-6"><h2 class="text-2xl font-bold text-indigo-400 mb-4">🏆 TOP 5 排行榜</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-slate-800 rounded-xl p-5"><h3 class="text-lg font-bold text-yellow-400 mb-3">💰 總價 by 區域</h3><div id="top5PriceDist"></div></div>
                    <div class="bg-slate-800 rounded-xl p-5"><h3 class="text-lg font-bold text-green-400 mb-3">🔥 成交數 by 區域</h3><div id="top5VolDist"></div></div>
                    <div class="bg-slate-800 rounded-xl p-5"><h3 class="text-lg font-bold text-purple-400 mb-3">💎 總價最高物件</h3><div id="top5HighestPrice"></div></div>
                    <div class="bg-slate-800 rounded-xl p-5"><h3 class="text-lg font-bold text-blue-400 mb-3">📈 成交數最高建案</h3><div id="top5HighestVol"></div></div>
                </div>
            </div>
        </div>

        <!-- Resale Tab -->
        <div id="contentResale" style="display:none;">
            <div class="bg-gradient-to-r from-purple-900 to-indigo-900 rounded-xl p-6 mb-6"><h2 class="text-2xl font-bold text-purple-300 mb-3">🤖 AI 市場分析</h2><div id="aiAnalysisResale" class="text-gray-200"></div></div>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-slate-800 rounded-xl p-6"><h3 class="text-xl font-bold text-indigo-400 mb-4">📊 銷售量趨勢</h3><canvas id="volumeChartResale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6"><h3 class="text-xl font-bold text-indigo-400 mb-4">💰 均價趨勢</h3><canvas id="priceChartResale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6" id="pieResale"><h3 class="text-xl font-bold text-indigo-400 mb-4">🥧 區域佔比</h3><canvas id="pieChartResale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6" id="barResale"><h3 class="text-xl font-bold text-indigo-400 mb-4">📊 區域均價</h3><canvas id="barChartResale"></canvas></div>
            </div>
            <div class="mb-6"><h2 class="text-2xl font-bold text-indigo-400 mb-4">🏆 TOP 5 排行榜</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-slate-800 rounded-xl p-5"><h3 class="text-lg font-bold text-yellow-400 mb-3">💰 總價 by 區域</h3><div id="top5PriceDistR"></div></div>
                    <div class="bg-slate-800 rounded-xl p-5"><h3 class="text-lg font-bold text-green-400 mb-3">🔥 成交數 by 區域</h3><div id="top5VolDistR"></div></div>
                    <div class="bg-slate-800 rounded-xl p-5"><h3 class="text-lg font-bold text-purple-400 mb-3">💎 總價最高物件</h3><div id="top5HighestPriceR"></div></div>
                    <div class="bg-slate-800 rounded-xl p-5"><h3 class="text-lg font-bold text-blue-400 mb-3">📈 成交數最高社區</h3><div id="top5HighestVolR"></div></div>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl p-4 text-center text-sm text-gray-400"><div id="dataInfo"></div></div>
        <div id="status" class="mt-4 text-center text-sm text-gray-500"></div>
    </div>

    <script>
        let db,presaleData=[],resaleData=[],filteredPresale=[],filteredResale=[],charts={};
        const GH_P='https://raw.githubusercontent.com/pickymiao/estate_dashboard/main/presale.csv';
        const GH_R='https://raw.githubusercontent.com/pickymiao/estate_dashboard/main/resale.csv';

        async function initDB(){return new Promise((r,j)=>{const req=indexedDB.open('EstatePro',5);req.onerror=()=>j(req.error);req.onsuccess=()=>r(req.result);req.onupgradeneeded=(e)=>{const db=e.target.result;['presale','resale'].forEach(t=>{if(db.objectStoreNames.contains(t))db.deleteObjectStore(t);db.createObjectStore(t,{keyPath:'uid'});});};});}

        function parsePresale(row){const u=row.rps12||'';if(!u.includes('住家用'))return null;const p=parseFloat(row.rps21_amountsunitdollars)/10000||0;const r=parseInt(row.rps16_quantity)||0;if(p>10000&&r<=2)return null;if(!p||!r)return null;const date=row.rps07||'';if(!date)return null;const uid=row.rps26||`P_${row.district}_${date}_${Math.random()}`;const project=row.rps28?row.rps28.trim():'未命名';return{uid,district:row.district||'',date,price:p,rooms:r,project,location:row.rps03_area||''};}

        function parseResale(row){const u=row.rps12||'';if(!u.includes('住家用'))return null;const p=parseFloat(row.rps21_amountsunitdollars)/10000||0;const r=parseInt(row.rps16_quantity)||0;const age=parseInt(row.rps18_quantity)||0;if(p>10000&&r<=2)return null;if(!p||!r)return null;const date=row.rps07_yyymmddroc||'';if(!date)return null;const uid=row.rps26||`R_${row.district}_${date}_${Math.random()}`;const addr=row.rps02?row.rps02.trim():'';const community=extractCommunityName(addr);return{uid,district:row.district||'',date,price:p,rooms:r,age,address:addr,community,location:row.rps03_area||''};}

        function extractCommunityName(addr){if(!addr)return '未命名';const patterns=[/(.+)[社區|大樓|大廈|公寓|華廈]/,/(.+)區.+[路|街]/];for(const p of patterns){const m=addr.match(p);if(m)return m[1].trim();}return addr.substring(0,15);}

        async function saveToDB(records,type){const tx=db.transaction([type],'readwrite');const store=tx.objectStore(type);let saved=0;for(const rec of records){if(rec){await store.put(rec);saved++;}}console.log(`Saved ${saved} to ${type}`);return saved;}

        async function loadFromDB(type){const tx=db.transaction([type],'readonly');const store=tx.objectStore(type);return new Promise((r,j)=>{const req=store.getAll();req.onsuccess=()=>r(req.result);req.onerror=()=>j(req.error);});}

        async function fetchCSV(url){const resp=await fetch(url);const text=await resp.text();return new Promise((r)=>{Papa.parse(text,{header:true,skipEmptyLines:true,encoding:'UTF-8',complete:(res)=>r(res.data)});});}

        async function syncData(){try{setStatus('🔄 同步中...');const[p,r]=await Promise.all([fetchCSV(GH_P),fetchCSV(GH_R)]);console.log('Fetched:',p.length,r.length);const pp=p.map(parsePresale).filter(x=>x);const rr=r.map(parseResale).filter(x=>x);console.log('Parsed:',pp.length,rr.length);const sp=await saveToDB(pp,'presale');const sr=await saveToDB(rr,'resale');presaleData=await loadFromDB('presale');resaleData=await loadFromDB('resale');console.log('Loaded:',presaleData.length,resaleData.length);populateFilters();applyGlobalFilters();setStatus(`✅ 預售${sp}/中古${sr}`);}catch(e){console.error(e);setStatus('❌ '+e.message);}}

        document.getElementById('fileInput').addEventListener('change',async(e)=>{const files=e.target.files;for(const file of files){const text=await file.text();const parsed=await new Promise(r=>{Papa.parse(text,{header:true,skipEmptyLines:true,encoding:'UTF-8',complete:(res)=>r(res.data)});});if(file.name.includes('presale')){const pp=parsed.map(parsePresale).filter(x=>x);await saveToDB(pp,'presale');presaleData=await loadFromDB('presale');}else{const rr=parsed.map(parseResale).filter(x=>x);await saveToDB(rr,'resale');resaleData=await loadFromDB('resale');}}populateFilters();applyGlobalFilters();setStatus('✅ 已上傳');e.target.value='';});

        async function clearData(){if(!confirm('確定?'))return;const tx=db.transaction(['presale','resale'],'readwrite');await tx.objectStore('presale').clear();await tx.objectStore('resale').clear();presaleData=[];resaleData=[];populateFilters();applyGlobalFilters();setStatus('✅ 清除');}

        function populateFilters(){const districts=[...new Set([...presaleData.map(x=>x.district),...resaleData.map(x=>x.district)])].sort();const sel=document.getElementById('districtFilter');sel.innerHTML=districts.map(d=>`<option value="${d}">${d}</option>`).join('');}

        function switchTab(tab){document.getElementById('contentPresale').style.display=tab==='presale'?'block':'none';document.getElementById('contentResale').style.display=tab==='resale'?'block':'none';document.getElementById('tabPresale').className=tab==='presale'?'px-6 py-3 font-semibold rounded-t-lg bg-indigo-600 text-white':'px-6 py-3 font-semibold rounded-t-lg bg-slate-800 text-gray-400';document.getElementById('tabResale').className=tab==='resale'?'px-6 py-3 font-semibold rounded-t-lg bg-indigo-600 text-white':'px-6 py-3 font-semibold rounded-t-lg bg-slate-800 text-gray-400';}

        function applyGlobalFilters(){const districts=Array.from(document.getElementById('districtFilter').selectedOptions).map(o=>o.value);const room=document.getElementById('roomFilter').value;const ds=document.getElementById('dateStart').value.replace('-','');const de=document.getElementById('dateEnd').value.replace('-','');filteredPresale=presaleData.filter(x=>{if(districts.length&&!districts.includes(x.district))return false;if(room&&x.rooms!=room&&!(room=='4'&&x.rooms>=4))return false;if(ds&&x.date<ds)return false;if(de&&x.date>de)return false;return true;});filteredResale=resaleData.filter(x=>{if(districts.length&&!districts.includes(x.district))return false;if(room&&x.rooms!=room&&!(room=='4'&&x.rooms>=4))return false;if(ds&&x.date<ds)return false;if(de&&x.date>de)return false;return true;});console.log('Filtered:',filteredPresale.length,filteredResale.length);renderPresale();renderResale();updateDataInfo();setStatus(`✅ 預售${filteredPresale.length}/中古${filteredResale.length}`);}

        function renderPresale(){const hasDistrict=document.getElementById('districtFilter').selectedOptions.length===1;document.getElementById('piePresale').style.display=hasDistrict?'none':'block';document.getElementById('barPresale').style.display=hasDistrict?'none':'block';const md={};filteredPresale.forEach(x=>{const m=x.date.substring(0,6);if(!md[m])md[m]={c:0,s:0};md[m].c++;md[m].s+=x.price;});const months=Object.keys(md).sort();const ctx1=document.getElementById('volumeChartPresale');if(charts.vp)charts.vp.destroy();charts.vp=new Chart(ctx1,{type:'line',data:{labels:months,datasets:[{label:'成交數',data:months.map(m=>md[m].c),borderColor:'#818cf8',tension:0.3}]},options:{responsive:true}});const ctx2=document.getElementById('priceChartPresale');if(charts.pp)charts.pp.destroy();charts.pp=new Chart(ctx2,{type:'line',data:{labels:months,datasets:[{label:'均價(萬)',data:months.map(m=>(md[m].s/md[m].c).toFixed(0)),borderColor:'#f59e0b',tension:0.3}]},options:{responsive:true}});if(!hasDistrict){const dv={};filteredPresale.forEach(x=>dv[x.district]=(dv[x.district]||0)+1);const s1=Object.entries(dv).sort((a,b)=>b[1]-a[1]).slice(0,10);const ctx3=document.getElementById('pieChartPresale');if(charts.piep)charts.piep.destroy();charts.piep=new Chart(ctx3,{type:'pie',data:{labels:s1.map(x=>x[0]),datasets:[{data:s1.map(x=>x[1]),backgroundColor:['#818cf8','#34d399','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4','#84cc16']}]}});const ds={};filteredPresale.forEach(x=>{if(!ds[x.district])ds[x.district]={s:0,c:0};ds[x.district].s+=x.price;ds[x.district].c++;});const s2=Object.entries(ds).map(([d,s])=>({d,a:s.s/s.c})).sort((a,b)=>b.a-a.a).slice(0,10);const ctx4=document.getElementById('barChartPresale');if(charts.bp)charts.bp.destroy();charts.bp=new Chart(ctx4,{type:'bar',data:{labels:s2.map(x=>x.d),datasets:[{label:'均價(萬)',data:s2.map(x=>x.a.toFixed(0)),backgroundColor:'#818cf8'}]}});}const dprice={};filteredPresale.forEach(x=>{if(!dprice[x.district])dprice[x.district]=0;dprice[x.district]+=x.price;});const t1=Object.entries(dprice).sort((a,b)=>b[1]-a[1]).slice(0,5);document.getElementById('top5PriceDist').innerHTML=t1.map((x,i)=>`<div class="mb-2 p-2 bg-slate-700 rounded"><div class="font-bold text-sm">${i+1}. ${x[0]}</div><div class="text-xs text-yellow-400">${x[1].toFixed(0)}萬</div></div>`).join('')||'<p class="text-gray-500 text-sm">暫無</p>';const dvol={};filteredPresale.forEach(x=>dvol[x.district]=(dvol[x.district]||0)+1);const t2=Object.entries(dvol).sort((a,b)=>b[1]-a[1]).slice(0,5);document.getElementById('top5VolDist').innerHTML=t2.map((x,i)=>`<div class="mb-2 p-2 bg-slate-700 rounded"><div class="font-bold text-sm">${i+1}. ${x[0]}</div><div class="text-xs text-green-400">${x[1]}筆</div></div>`).join('')||'<p class="text-gray-500 text-sm">暫無</p>';const t3=[...filteredPresale].sort((a,b)=>b.price-a.price).slice(0,5);document.getElementById('top5HighestPrice').innerHTML=t3.map((x,i)=>`<div class="mb-2 p-2 bg-slate-700 rounded"><div class="font-bold text-xs">${i+1}. ${x.project}</div><div class="text-xs text-purple-400">${x.price.toFixed(0)}萬</div><div class="text-xs text-gray-400">${x.district}</div></div>`).join('')||'<p class="text-gray-500 text-sm">暫無</p>';const pvol={};filteredPresale.filter(x=>x.project!=='未命名').forEach(x=>pvol[x.project]=(pvol[x.project]||0)+1);const t4=Object.entries(pvol).sort((a,b)=>b[1]-a[1]).slice(0,5);document.getElementById('top5HighestVol').innerHTML=t4.map((x,i)=>`<div class="mb-2 p-2 bg-slate-700 rounded"><div class="font-bold text-xs">${i+1}. ${x[0]}</div><div class="text-xs text-blue-400">${x[1]}筆</div></div>`).join('')||'<p class="text-gray-500 text-sm">暫無</p>';runAIAnalysisPresale();}

        function renderResale(){const hasDistrict=document.getElementById('districtFilter').selectedOptions.length===1;document.getElementById('pieResale').style.display=hasDistrict?'none':'block';document.getElementById('barResale').style.display=hasDistrict?'none':'block';const md={};filteredResale.forEach(x=>{const m=x.date.substring(0,6);if(!md[m])md[m]={c:0,s:0};md[m].c++;md[m].s+=x.price;});const months=Object.keys(md).sort();const ctx1=document.getElementById('volumeChartResale');if(charts.vr)charts.vr.destroy();charts.vr=new Chart(ctx1,{type:'line',data:{labels:months,datasets:[{label:'成交數',data:months.map(m=>md[m].c),borderColor:'#34d399',tension:0.3}]},options:{responsive:true}});const ctx2=document.getElementById('priceChartResale');if(charts.pr)charts.pr.destroy();charts.pr=new Chart(ctx2,{type:'line',data:{labels:months,datasets:[{label:'均價(萬)',data:months.map(m=>(md[m].s/md[m].c).toFixed(0)),borderColor:'#10b981',tension:0.3}]},options:{responsive:true}});if(!hasDistrict){const dv={};filteredResale.forEach(x=>dv[x.district]=(dv[x.district]||0)+1);const s1=Object.entries(dv).sort((a,b)=>b[1]-a[1]).slice(0,10);const ctx3=document.getElementById('pieChartResale');if(charts.pier)charts.pier.destroy();charts.pier=new Chart(ctx3,{type:'pie',data:{labels:s1.map(x=>x[0]),datasets:[{data:s1.map(x=>x[1]),backgroundColor:['#818cf8','#34d399','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4','#84cc16']}]}});const ds={};filteredResale.forEach(x=>{if(!ds[x.district])ds[x.district]={s:0,c:0};ds[x.district].s+=x.price;ds[x.district].c++;});const s2=Object.entries(ds).map(([d,s])=>({d,a:s.s/s.c})).sort((a,b)=>b.a-a.a).slice(0,10);const ctx4=document.getElementById('barChartResale');if(charts.br)charts.br.destroy();charts.br=new Chart(ctx4,{type:'bar',data:{labels:s2.map(x=>x.d),datasets:[{label:'均價(萬)',data:s2.map(x=>x.a.toFixed(0)),backgroundColor:'#34d399'}]}});}const dprice={};filteredResale.forEach(x=>{if(!dprice[x.district])dprice[x.district]=0;dprice[x.district]+=x.price;});const t1=Object.entries(dprice).sort((a,b)=>b[1]-a[1]).slice(0,5);document.getElementById('top5PriceDistR').innerHTML=t1.map((x,i)=>`<div class="mb-2 p-2 bg-slate-700 rounded"><div class="font-bold text-sm">${i+1}. ${x[0]}</div><div class="text-xs text-yellow-400">${x[1].toFixed(0)}萬</div></div>`).join('')||'<p class="text-gray-500 text-sm">暫無</p>';const dvol={};filteredResale.forEach(x=>dvol[x.district]=(dvol[x.district]||0)+1);const t2=Object.entries(dvol).sort((a,b)=>b[1]-a[1]).slice(0,5);document.getElementById('top5VolDistR').innerHTML=t2.map((x,i)=>`<div class="mb-2 p-2 bg-slate-700 rounded"><div class="font-bold text-sm">${i+1}. ${x[0]}</div><div class="text-xs text-green-400">${x[1]}筆</div></div>`).join('')||'<p class="text-gray-500 text-sm">暫無</p>';const t3=[...filteredResale].sort((a,b)=>b.price-a.price).slice(0,5);document.getElementById('top5HighestPriceR').innerHTML=t3.map((x,i)=>`<div class="mb-2 p-2 bg-slate-700 rounded"><div class="font-bold text-xs">${i+1}. ${x.community}</div><div class="text-xs text-purple-400">${x.price.toFixed(0)}萬</div><div class="text-xs text-gray-400">${x.district}</div></div>`).join('')||'<p class="text-gray-500 text-sm">暫無</p>';const cvol={};filteredResale.filter(x=>x.community!=='未命名').forEach(x=>cvol[x.community]=(cvol[x.community]||0)+1);const t4=Object.entries(cvol).sort((a,b)=>b[1]-a[1]).slice(0,5);document.getElementById('top5HighestVolR').innerHTML=t4.map((x,i)=>`<div class="mb-2 p-2 bg-slate-700 rounded"><div class="font-bold text-xs">${i+1}. ${x[0]}</div><div class="text-xs text-blue-400">${x[1]}筆</div></div>`).join('')||'<p class="text-gray-500 text-sm">暫無</p>';runAIAnalysisResale();}

        async function runAIAnalysisPresale(){if(!filteredPresale.length){document.getElementById('aiAnalysisPresale').innerHTML='<p class="text-gray-400">📊 暫無數據</p>';return;}const ap=filteredPresale.reduce((s,x)=>s+x.price,0)/filteredPresale.length;document.getElementById('aiAnalysisPresale').innerHTML='<p class="text-lg">🔄 正在分析即時市場動態...</p>';try{const analysis=await fetchMarketAnalysis('presale',ap,filteredPresale.length);document.getElementById('aiAnalysisPresale').innerHTML=analysis;}catch(e){document.getElementById('aiAnalysisPresale').innerHTML=`<p>共<strong>${filteredPresale.length}</strong>筆｜均價<strong>${ap.toFixed(0)}萬</strong></p><p class="mt-2 text-sm">預售市場呈現${ap>2000?'高總價產品主導':'中低總價為主力'}，建議關注區域發展與交通建設。</p>`;}}

        async function runAIAnalysisResale(){if(!filteredResale.length){document.getElementById('aiAnalysisResale').innerHTML='<p class="text-gray-400">📊 暫無數據</p>';return;}const ap=filteredResale.reduce((s,x)=>s+x.price,0)/filteredResale.length;document.getElementById('aiAnalysisResale').innerHTML='<p class="text-lg">🔄 正在分析即時市場動態...</p>';try{const analysis=await fetchMarketAnalysis('resale',ap,filteredResale.length);document.getElementById('aiAnalysisResale').innerHTML=analysis;}catch(e){document.getElementById('aiAnalysisResale').innerHTML=`<p>共<strong>${filteredResale.length}</strong>筆｜均價<strong>${ap.toFixed(0)}萬</strong></p><p class="mt-2 text-sm">中古市場流通性${filteredResale.length>100?'高':'適中'}，平均總價${ap.toFixed(0)}萬${ap>1500?'接近區域天花板':'具議價空間'}。</p>`;}}

        async function fetchMarketAnalysis(type,avgPrice,volume){const prompt=`你是房地產市場分析師。當前${type==='presale'?'預售屋':'中古屋'}市場數據：平均總價${avgPrice.toFixed(0)}萬，成交量${volume}筆。請結合當前(2026年4月)台灣經濟環境、央行利率政策、股市表現、國際經濟情勢、通膨狀況等因素，以繁體中文提供150字內的精簡分析與購屋建議。`;const response=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':'','anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,messages:[{role:'user',content:prompt}]})});if(!response.ok)throw new Error('API failed');const data=await response.json();const text=data.content.find(c=>c.type==='text')?.text||'分析生成失敗';return `<p>共<strong>${volume}</strong>筆｜均價<strong>${avgPrice.toFixed(0)}萬</strong></p><div class="mt-3 p-3 bg-slate-700/50 rounded-lg text-sm leading-relaxed">${text}</div>`;}

        function updateDataInfo(){if(!presaleData.length&&!resaleData.length){document.getElementById('dataInfo').innerHTML='';return;}const all=[...presaleData.map(x=>x.date),...resaleData.map(x=>x.date)].filter(x=>x).sort();if(!all.length)return;const now=new Date().toLocaleString('zh-TW');document.getElementById('dataInfo').innerHTML=`📅 ${all[0]}~${all[all.length-1]} ｜ 🔄 ${now} ｜ 📊 預售${presaleData.length.toLocaleString()}/中古${resaleData.length.toLocaleString()}`;}

        function setStatus(msg){document.getElementById('status').textContent=msg;}

        (async()=>{db=await initDB();presaleData=await loadFromDB('presale');resaleData=await loadFromDB('resale');console.log('Init:',presaleData.length,resaleData.length);populateFilters();if(!presaleData.length&&!resaleData.length){setStatus('🔄 自動同步...');await syncData();}else{applyGlobalFilters();setStatus('✅ 已載入');}})();
    </script>
</body>
</html>
