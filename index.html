<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTATE PRO v45.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-900 text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-indigo-400 mb-4">ESTATE PRO v45.0</h1>
            <div class="flex flex-wrap gap-3">
                <button onclick="syncData()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg font-semibold">🔄 同步</button>
                <label class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg font-semibold cursor-pointer">
                    📁 上傳
                    <input type="file" id="fileInput" accept=".csv" multiple onchange="handleFileUpload(event)" class="hidden">
                </label>
                <button onclick="clearData()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg font-semibold">🗑️ 清除</button>
            </div>
        </div>

        <div class="bg-gradient-to-r from-purple-900 to-indigo-900 rounded-xl p-6 mb-6 shadow-xl">
            <h2 class="text-2xl font-bold text-purple-300 mb-3">🤖 AI 市場摘要</h2>
            <div id="aiSummary" class="text-gray-200 text-lg"></div>
        </div>

        <div class="bg-slate-800 rounded-xl p-6 mb-6 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                <div><label class="block text-sm font-semibold mb-2">區域</label><select id="districtFilter" class="w-full bg-slate-700 rounded-lg px-3 py-2"><option value="">全區域</option></select></div>
                <div><label class="block text-sm font-semibold mb-2">類型</label><select id="typeFilter" onchange="updateTypeFilters()" class="w-full bg-slate-700 rounded-lg px-3 py-2"><option value="">全部</option><option value="presale">預售</option><option value="resale">中古</option></select></div>
                <div id="projectFilterDiv" style="display:none;"><label class="block text-sm font-semibold mb-2">建案</label><select id="projectFilter" class="w-full bg-slate-700 rounded-lg px-3 py-2"><option value="">全部</option></select></div>
                <div id="ageFilterDiv" style="display:none;"><label class="block text-sm font-semibold mb-2">屋齡</label><select id="ageFilter" class="w-full bg-slate-700 rounded-lg px-3 py-2"><option value="">全部</option><option value="5">5年內</option><option value="10">10年內</option><option value="20">20年內</option></select></div>
                <div><label class="block text-sm font-semibold mb-2">房型</label><select id="roomFilter" class="w-full bg-slate-700 rounded-lg px-3 py-2"><option value="">全部</option><option value="1">1房</option><option value="2">2房</option><option value="3">3房</option><option value="4">4房+</option></select></div>
            </div>
            <button onclick="applyFilters()" class="mt-4 bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded-lg font-semibold">套用</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="bg-slate-800 rounded-xl p-6 shadow-xl"><h3 class="text-xl font-bold text-indigo-400 mb-4">📊 每月銷售量</h3><canvas id="volumeChart"></canvas></div>
            <div class="bg-slate-800 rounded-xl p-6 shadow-xl"><h3 class="text-xl font-bold text-indigo-400 mb-4">💰 每月均價</h3><canvas id="priceChart"></canvas></div>
            <div class="bg-slate-800 rounded-xl p-6 shadow-xl" id="pieChartDiv"><h3 class="text-xl font-bold text-indigo-400 mb-4">🥧 區域佔比</h3><canvas id="pieChart"></canvas></div>
            <div class="bg-slate-800 rounded-xl p-6 shadow-xl" id="barChartDiv"><h3 class="text-xl font-bold text-indigo-400 mb-4">📊 區域均價</h3><canvas id="barChart"></canvas></div>
        </div>

        <div class="mb-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-2xl font-bold text-indigo-400">🏆 TOP 5</h2>
                <div class="flex gap-3"><input type="month" id="top5StartDate" class="bg-slate-700 rounded-lg px-3 py-2 text-sm"><input type="month" id="top5EndDate" class="bg-slate-700 rounded-lg px-3 py-2 text-sm"><button onclick="updateTop5()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm font-semibold">更新</button></div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-slate-800 rounded-xl p-6 shadow-xl"><h3 class="text-lg font-bold text-yellow-400 mb-4">🔥 預售量</h3><div id="top5PresaleVolume"></div></div>
                <div class="bg-slate-800 rounded-xl p-6 shadow-xl"><h3 class="text-lg font-bold text-green-400 mb-4">💎 預售價</h3><div id="top5PresalePrice"></div></div>
                <div class="bg-slate-800 rounded-xl p-6 shadow-xl"><h3 class="text-lg font-bold text-purple-400 mb-4">🏠 中古價</h3><div id="top5ResalePrice"></div></div>
            </div>
        </div>

        <div class="bg-gradient-to-r from-indigo-900 to-slate-800 rounded-xl p-6 mb-6 shadow-xl">
            <h2 class="text-xl font-bold text-indigo-300 mb-4">📈 深度分析</h2>
            <div id="deepAnalysis"></div>
        </div>

        <div class="bg-slate-800 rounded-xl p-4 text-center text-sm text-gray-400"><div id="dataInfo"></div></div>
        <div id="status" class="mt-4 text-center text-sm text-gray-500"></div>
    </div>

    <script>
        let db,allData=[],filteredData=[],charts={};
        const GITHUB_PRESALE='https://raw.githubusercontent.com/pickymiao/estate_dashboard/main/presale.csv';
        const GITHUB_RESALE='https://raw.githubusercontent.com/pickymiao/estate_dashboard/main/resale.csv';

        async function initDB(){return new Promise((resolve,reject)=>{const request=indexedDB.open('EstateProDB',2);request.onerror=()=>reject(request.error);request.onsuccess=()=>resolve(request.result);request.onupgradeneeded=(e)=>{const db=e.target.result;if(!db.objectStoreNames.contains('transactions')){const store=db.createObjectStore('transactions',{keyPath:'uid'});store.createIndex('district','district',{unique:false});store.createIndex('date','date',{unique:false});store.createIndex('type','type',{unique:false});}};});}

        function generateUID(row,type){const id=row.rps26||row.rps27;if(id)return type+'_'+id;const str=`${row.district}_${row.rps05}_${row.rps21_amountsunitdollars}_${type}`;let hash=0;for(let i=0;i<str.length;i++){hash=((hash<<5)-hash)+str.charCodeAt(i);hash|=0;}return 'hash_'+type+'_'+hash;}

        function parseRow(row,type){const price=parseFloat(row.rps21_amountsunitdollars)/10000||0;const unitPrice=parseFloat(row.rps22_amountsunitdollars)/10000||0;const rooms=parseInt(row.rps16_quantity)||0;const usage=row.rps12||'';const age=parseInt(row.rps18_quantity)||0;if(!usage.includes('住家用'))return null;if(price>10000&&rooms<=2)return null;return{uid:generateUID(row,type),type:type,district:row.district||'',date:row.rps05||'',price:price,unitPrice:unitPrice,rooms:rooms,age:age,project:row.rps27||'未命名',location:row.rps03_area||'',usage:usage};}

        async function saveToDB(records){const tx=db.transaction(['transactions'],'readwrite');const store=tx.objectStore('transactions');let saved=0;for(const record of records){if(record){await store.put(record);saved++;}}return saved;}

        async function loadFromDB(){const tx=db.transaction(['transactions'],'readonly');const store=tx.objectStore('transactions');return new Promise((resolve,reject)=>{const request=store.getAll();request.onsuccess=()=>resolve(request.result);request.onerror=()=>reject(request.error);});}

        async function fetchCSV(url){const response=await fetch(url);const text=await response.text();return new Promise((resolve)=>{Papa.parse(text,{header:true,skipEmptyLines:true,complete:(results)=>resolve(results.data)});});}

        async function syncData(){try{setStatus('🔄 同步中...');const[presale,resale]=await Promise.all([fetchCSV(GITHUB_PRESALE),fetchCSV(GITHUB_RESALE)]);const presaleParsed=presale.map(r=>parseRow(r,'presale')).filter(r=>r);const resaleParsed=resale.map(r=>parseRow(r,'resale')).filter(r=>r);const saved=await saveToDB([...presaleParsed,...resaleParsed]);allData=await loadFromDB();populateFilters();applyFilters();setStatus(`✅ ${saved} 筆`);}catch(error){setStatus('❌ 失敗');}}

        async function handleFileUpload(event){const files=event.target.files;let allRecords=[];for(const file of files){const text=await file.text();const parsed=await new Promise(resolve=>{Papa.parse(text,{header:true,skipEmptyLines:true,complete:(results)=>resolve(results.data)});});const type=file.name.includes('presale')?'presale':'resale';allRecords.push(...parsed.map(r=>parseRow(r,type)).filter(r=>r));}const saved=await saveToDB(allRecords);allData=await loadFromDB();populateFilters();applyFilters();setStatus(`✅ ${saved} 筆`);document.getElementById('fileInput').value='';}

        async function clearData(){if(!confirm('確定清除？'))return;const tx=db.transaction(['transactions'],'readwrite');await tx.objectStore('transactions').clear();allData=[];filteredData=[];populateFilters();applyFilters();setStatus('✅ 已清除');}

        function populateFilters(){const districts=[...new Set(allData.map(r=>r.district))].sort();const projects=[...new Set(allData.filter(r=>r.type==='presale'&&r.project!=='未命名').map(r=>r.project))].sort();document.getElementById('districtFilter').innerHTML='<option value="">全區域</option>'+districts.map(d=>`<option value="${d}">${d}</option>`).join('');document.getElementById('projectFilter').innerHTML='<option value="">全部</option>'+projects.map(p=>`<option value="${p}">${p}</option>`).join('');}

        function updateTypeFilters(){const type=document.getElementById('typeFilter').value;document.getElementById('projectFilterDiv').style.display=type==='presale'?'block':'none';document.getElementById('ageFilterDiv').style.display=type==='resale'?'block':'none';}

        function applyFilters(){const district=document.getElementById('districtFilter').value;const type=document.getElementById('typeFilter').value;const project=document.getElementById('projectFilter').value;const age=document.getElementById('ageFilter').value;const rooms=document.getElementById('roomFilter').value;filteredData=allData.filter(r=>{if(district&&r.district!==district)return false;if(type&&r.type!==type)return false;if(project&&r.project!==project)return false;if(age&&r.age>parseInt(age))return false;if(rooms&&r.rooms!=rooms&&!(rooms=='4'&&r.rooms>=4))return false;return true;});renderCharts();updateTop5();runAIAnalysis();updateDataInfo();setStatus(`✅ ${filteredData.length} 筆`);}

        function renderCharts(){const district=document.getElementById('districtFilter').value;document.getElementById('pieChartDiv').style.display=district?'none':'block';document.getElementById('barChartDiv').style.display=district?'none':'block';renderVolumeChart();renderPriceChart();if(!district){renderPieChart();renderBarChart();}}

        function renderVolumeChart(){const ctx=document.getElementById('volumeChart');if(charts.volume)charts.volume.destroy();const monthlyData={};filteredData.forEach(r=>{const month=r.date.substring(0,6);if(!monthlyData[month])monthlyData[month]={presale:0,resale:0};monthlyData[month][r.type]++;});const months=Object.keys(monthlyData).sort();charts.volume=new Chart(ctx,{type:'line',data:{labels:months,datasets:[{label:'預售',data:months.map(m=>monthlyData[m].presale),borderColor:'#818cf8',backgroundColor:'rgba(129,140,248,0.1)'},{label:'中古',data:months.map(m=>monthlyData[m].resale),borderColor:'#34d399',backgroundColor:'rgba(52,211,153,0.1)'}]},options:{responsive:true,maintainAspectRatio:true}});}

        function renderPriceChart(){const ctx=document.getElementById('priceChart');if(charts.price)charts.price.destroy();const monthlyData={};filteredData.forEach(r=>{const month=r.date.substring(0,6);if(!monthlyData[month])monthlyData[month]={presale:{sum:0,count:0},resale:{sum:0,count:0}};monthlyData[month][r.type].sum+=r.unitPrice;monthlyData[month][r.type].count++;});const months=Object.keys(monthlyData).sort();charts.price=new Chart(ctx,{type:'line',data:{labels:months,datasets:[{label:'預售均價',data:months.map(m=>monthlyData[m].presale.count?(monthlyData[m].presale.sum/monthlyData[m].presale.count).toFixed(1):0),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,0.1)'},{label:'中古均價',data:months.map(m=>monthlyData[m].resale.count?(monthlyData[m].resale.sum/monthlyData[m].resale.count).toFixed(1):0),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)'}]},options:{responsive:true,maintainAspectRatio:true}});}

        function renderPieChart(){const ctx=document.getElementById('pieChart');if(charts.pie)charts.pie.destroy();const districtVolume={};filteredData.forEach(r=>{districtVolume[r.district]=(districtVolume[r.district]||0)+1;});const sorted=Object.entries(districtVolume).sort((a,b)=>b[1]-a[1]).slice(0,10);charts.pie=new Chart(ctx,{type:'pie',data:{labels:sorted.map(s=>s[0]),datasets:[{data:sorted.map(s=>s[1]),backgroundColor:['#818cf8','#34d399','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4','#84cc16']}]},options:{responsive:true,maintainAspectRatio:true}});}

        function renderBarChart(){const ctx=document.getElementById('barChart');if(charts.bar)charts.bar.destroy();const districtStats={};filteredData.forEach(r=>{if(!districtStats[r.district])districtStats[r.district]={sum:0,count:0};districtStats[r.district].sum+=r.unitPrice;districtStats[r.district].count++;});const sorted=Object.entries(districtStats).map(([d,s])=>({district:d,avg:s.sum/s.count})).sort((a,b)=>b.avg-a.avg).slice(0,10);charts.bar=new Chart(ctx,{type:'bar',data:{labels:sorted.map(s=>s.district),datasets:[{label:'均價(萬/坪)',data:sorted.map(s=>s.avg.toFixed(1)),backgroundColor:'#818cf8'}]},options:{responsive:true,maintainAspectRatio:true}});}

        function updateTop5(){const startDate=document.getElementById('top5StartDate').value.replace('-','');const endDate=document.getElementById('top5EndDate').value.replace('-','');const rangeData=allData.filter(r=>{if(startDate&&r.date<startDate)return false;if(endDate&&r.date>endDate)return false;return true;});const presaleVolume={};rangeData.filter(r=>r.type==='presale'&&r.project!=='未命名').forEach(r=>{presaleVolume[r.project]=(presaleVolume[r.project]||0)+1;});const top5PresaleVol=Object.entries(presaleVolume).sort((a,b)=>b[1]-a[1]).slice(0,5);document.getElementById('top5PresaleVolume').innerHTML=top5PresaleVol.map((item,i)=>`<div class="mb-3 p-3 bg-slate-700 rounded-lg"><div class="font-bold">${i+1}. ${item[0]}</div><div class="text-sm text-gray-400">${item[1]} 筆</div></div>`).join('')||'<p class="text-gray-500">暫無數據</p>';const presalePrice={};rangeData.filter(r=>r.type==='presale'&&r.project!=='未命名').forEach(r=>{if(!presalePrice[r.project])presalePrice[r.project]={sum:0,count:0,district:r.district};presalePrice[r.project].sum+=r.unitPrice;presalePrice[r.project].count++;});const top5PresalePrice=Object.entries(presalePrice).map(([p,s])=>({project:p,avg:s.sum/s.count,district:s.district})).sort((a,b)=>b.avg-a.avg).slice(0,5);document.getElementById('top5PresalePrice').innerHTML=top5PresalePrice.map((item,i)=>`<div class="mb-3 p-3 bg-slate-700 rounded-lg"><div class="font-bold">${i+1}. ${item.project}</div><div class="text-sm text-indigo-400">${item.avg.toFixed(1)} 萬/坪</div><div class="text-xs text-gray-400">${item.district}</div></div>`).join('')||'<p class="text-gray-500">暫無數據</p>';const resalePrice={};rangeData.filter(r=>r.type==='resale').forEach(r=>{const key=r.location||r.district;if(!resalePrice[key])resalePrice[key]={sum:0,count:0,district:r.district};resalePrice[key].sum+=r.unitPrice;resalePrice[key].count++;});const top5ResalePrice=Object.entries(resalePrice).filter(([_,s])=>s.count>=2).map(([l,s])=>({location:l,avg:s.sum/s.count,district:s.district})).sort((a,b)=>b.avg-a.avg).slice(0,5);document.getElementById('top5ResalePrice').innerHTML=top5ResalePrice.map((item,i)=>`<div class="mb-3 p-3 bg-slate-700 rounded-lg"><div class="font-bold text-sm">${i+1}. ${item.location}</div><div class="text-sm text-purple-400">${item.avg.toFixed(1)} 萬/坪</div><div class="text-xs text-gray-400">${item.district}</div></div>`).join('')||'<p class="text-gray-500">暫無數據</p>';}

        function runAIAnalysis(){if(!filteredData.length){document.getElementById('aiSummary').innerHTML='📊 請上傳數據';document.getElementById('deepAnalysis').innerHTML='';return;}const presale=filteredData.filter(r=>r.type==='presale');const resale=filteredData.filter(r=>r.type==='resale');const avgPrice=filteredData.reduce((sum,r)=>sum+r.unitPrice,0)/filteredData.length;const district=document.getElementById('districtFilter').value;const summary=`共 <strong>${filteredData.length}</strong> 筆（預售 ${presale.length} / 中古 ${resale.length}）｜均價 <strong>${avgPrice.toFixed(1)} 萬/坪</strong> ｜${district?`${district}`:'全區域'}`;document.getElementById('aiSummary').innerHTML=summary;const analysis=`<div class="space-y-4"><div class="border-l-4 border-indigo-500 pl-4"><h3 class="font-bold mb-2">📊 結構分析</h3><p>預售/中古比 ${presale.length}:${resale.length}，${presale.length>resale.length?'新建案供給充沛':'中古流通活絡'}。</p></div><div class="border-l-4 border-yellow-500 pl-4"><h3 class="font-bold mb-2">💡 價格建議</h3><p>${avgPrice>50?'單價高水位，建議評估區域潛力與交通便利性':'單價親民，適合首購置產，關注周邊建設'}。</p></div></div>`;document.getElementById('deepAnalysis').innerHTML=analysis;}

        function updateDataInfo(){if(!allData.length){document.getElementById('dataInfo').innerHTML='';return;}const dates=allData.map(r=>r.date).sort();const startDate=dates[0];const endDate=dates[dates.length-1];const now=new Date().toLocaleString('zh-TW');document.getElementById('dataInfo').innerHTML=`📅 ${startDate}~${endDate} ｜ 🔄 ${now} ｜ 📊 ${allData.length.toLocaleString()}`;}

        function setStatus(msg){document.getElementById('status').textContent=msg;}

        (async()=>{db=await initDB();allData=await loadFromDB();populateFilters();if(allData.length===0){setStatus('🔄 同步中...');try{const[presale,resale]=await Promise.all([fetchCSV(GITHUB_PRESALE),fetchCSV(GITHUB_RESALE)]);const presaleParsed=presale.map(r=>parseRow(r,'presale')).filter(r=>r);const resaleParsed=resale.map(r=>parseRow(r,'resale')).filter(r=>r);const saved=await saveToDB([...presaleParsed,...resaleParsed]);allData=await loadFromDB();populateFilters();applyFilters();setStatus(`✅ ${saved} 筆`);}catch(error){setStatus('⚠️ 失敗');}}else{applyFilters();setStatus(`✅ ${allData.length} 筆`);}})();
    </script>
</body>
</html>
