<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTATE PRO v45.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-900 text-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <div class="mb-6">
            <h1 class="text-3xl font-bold text-indigo-400 mb-4">ESTATE PRO v45.2</h1>
            <div class="flex flex-wrap gap-3">
                <button onclick="syncData()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg font-semibold">🔄 同步</button>
                <label class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-lg font-semibold cursor-pointer">
                    📁 上傳
                    <input type="file" id="fileInput" accept=".csv" multiple class="hidden">
                </label>
                <button onclick="clearData()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg font-semibold">🗑️ 清除</button>
            </div>
        </div>

        <div class="flex gap-2 mb-6 border-b border-slate-700">
            <button onclick="switchTab('presale')" id="tabPresale" class="px-6 py-3 font-semibold rounded-t-lg bg-indigo-600 text-white">預售屋</button>
            <button onclick="switchTab('resale')" id="tabResale" class="px-6 py-3 font-semibold rounded-t-lg bg-slate-800 text-gray-400">中古屋</button>
        </div>

        <div id="contentPresale">
            <div class="bg-gradient-to-r from-purple-900 to-indigo-900 rounded-xl p-6 mb-6">
                <h2 class="text-2xl font-bold text-purple-300 mb-3">🤖 預售屋摘要</h2>
                <div id="aiSummaryPresale" class="text-gray-200 text-lg"></div>
            </div>

            <div class="bg-slate-800 rounded-xl p-6 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div><label class="block text-sm font-semibold mb-2">區域</label><select id="districtFilterPresale" class="w-full bg-slate-700 rounded-lg px-3 py-2"><option value="">全區域</option></select></div>
                    <div><label class="block text-sm font-semibold mb-2">建案</label><select id="projectFilterPresale" class="w-full bg-slate-700 rounded-lg px-3 py-2"><option value="">全部</option></select></div>
                    <div><label class="block text-sm font-semibold mb-2">房型</label><select id="roomFilterPresale" class="w-full bg-slate-700 rounded-lg px-3 py-2"><option value="">全部</option><option value="1">1房</option><option value="2">2房</option><option value="3">3房</option><option value="4">4房+</option></select></div>
                    <div class="flex items-end"><button onclick="applyFiltersPresale()" class="w-full bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded-lg font-semibold">套用</button></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-slate-800 rounded-xl p-6"><h3 class="text-xl font-bold text-indigo-400 mb-4">📊 銷售量</h3><canvas id="volumeChartPresale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6"><h3 class="text-xl font-bold text-indigo-400 mb-4">💰 均價</h3><canvas id="priceChartPresale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6" id="pieChartDivPresale"><h3 class="text-xl font-bold text-indigo-400 mb-4">🥧 區域佔比</h3><canvas id="pieChartPresale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6" id="barChartDivPresale"><h3 class="text-xl font-bold text-indigo-400 mb-4">📊 區域均價</h3><canvas id="barChartPresale"></canvas></div>
            </div>

            <div class="mb-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-bold text-indigo-400">🏆 TOP 5</h2>
                    <div class="flex gap-3"><input type="month" id="top5StartDatePresale" class="bg-slate-700 rounded-lg px-3 py-2 text-sm"><input type="month" id="top5EndDatePresale" class="bg-slate-700 rounded-lg px-3 py-2 text-sm"><button onclick="updateTop5Presale()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm font-semibold">更新</button></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-800 rounded-xl p-6"><h3 class="text-lg font-bold text-yellow-400 mb-4">🔥 銷售量</h3><div id="top5PresaleVolume"></div></div>
                    <div class="bg-slate-800 rounded-xl p-6"><h3 class="text-lg font-bold text-green-400 mb-4">💎 單價</h3><div id="top5PresalePrice"></div></div>
                </div>
            </div>

            <div class="bg-gradient-to-r from-indigo-900 to-slate-800 rounded-xl p-6 mb-6">
                <h2 class="text-xl font-bold text-indigo-300 mb-4">📈 分析</h2>
                <div id="deepAnalysisPresale"></div>
            </div>
        </div>

        <div id="contentResale" style="display:none;">
            <div class="bg-gradient-to-r from-purple-900 to-indigo-900 rounded-xl p-6 mb-6">
                <h2 class="text-2xl font-bold text-purple-300 mb-3">🤖 中古屋摘要</h2>
                <div id="aiSummaryResale" class="text-gray-200 text-lg"></div>
            </div>

            <div class="bg-slate-800 rounded-xl p-6 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div><label class="block text-sm font-semibold mb-2">區域</label><select id="districtFilterResale" class="w-full bg-slate-700 rounded-lg px-3 py-2"><option value="">全區域</option></select></div>
                    <div><label class="block text-sm font-semibold mb-2">屋齡</label><select id="ageFilterResale" class="w-full bg-slate-700 rounded-lg px-3 py-2"><option value="">全部</option><option value="5">5年內</option><option value="10">10年內</option><option value="20">20年內</option></select></div>
                    <div><label class="block text-sm font-semibold mb-2">房型</label><select id="roomFilterResale" class="w-full bg-slate-700 rounded-lg px-3 py-2"><option value="">全部</option><option value="1">1房</option><option value="2">2房</option><option value="3">3房</option><option value="4">4房+</option></select></div>
                    <div class="flex items-end"><button onclick="applyFiltersResale()" class="w-full bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded-lg font-semibold">套用</button></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                <div class="bg-slate-800 rounded-xl p-6"><h3 class="text-xl font-bold text-indigo-400 mb-4">📊 銷售量</h3><canvas id="volumeChartResale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6"><h3 class="text-xl font-bold text-indigo-400 mb-4">💰 均價</h3><canvas id="priceChartResale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6" id="pieChartDivResale"><h3 class="text-xl font-bold text-indigo-400 mb-4">🥧 區域佔比</h3><canvas id="pieChartResale"></canvas></div>
                <div class="bg-slate-800 rounded-xl p-6" id="barChartDivResale"><h3 class="text-xl font-bold text-indigo-400 mb-4">📊 區域均價</h3><canvas id="barChartResale"></canvas></div>
            </div>

            <div class="mb-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-bold text-indigo-400">🏆 TOP 5</h2>
                    <div class="flex gap-3"><input type="month" id="top5StartDateResale" class="bg-slate-700 rounded-lg px-3 py-2 text-sm"><input type="month" id="top5EndDateResale" class="bg-slate-700 rounded-lg px-3 py-2 text-sm"><button onclick="updateTop5Resale()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded-lg text-sm font-semibold">更新</button></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-slate-800 rounded-xl p-6"><h3 class="text-lg font-bold text-yellow-400 mb-4">🔥 區域量</h3><div id="top5ResaleVolume"></div></div>
                    <div class="bg-slate-800 rounded-xl p-6"><h3 class="text-lg font-bold text-purple-400 mb-4">💎 路段價</h3><div id="top5ResalePrice"></div></div>
                </div>
            </div>

            <div class="bg-gradient-to-r from-indigo-900 to-slate-800 rounded-xl p-6 mb-6">
                <h2 class="text-xl font-bold text-indigo-300 mb-4">📈 分析</h2>
                <div id="deepAnalysisResale"></div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl p-4 text-center text-sm text-gray-400"><div id="dataInfo"></div></div>
        <div id="status" class="mt-4 text-center text-sm text-gray-500"></div>
    </div>

    <script>
        let db,presaleData=[],resaleData=[],filteredPresale=[],filteredResale=[],charts={};
        const GH_P='https://raw.githubusercontent.com/pickymiao/estate_dashboard/main/presale.csv';
        const GH_R='https://raw.githubusercontent.com/pickymiao/estate_dashboard/main/resale.csv';

        async function initDB(){return new Promise((r,j)=>{const req=indexedDB.open('EstatePro',4);req.onerror=()=>j(req.error);req.onsuccess=()=>r(req.result);req.onupgradeneeded=(e)=>{const db=e.target.result;['presale','resale'].forEach(t=>{if(db.objectStoreNames.contains(t))db.deleteObjectStore(t);db.createObjectStore(t,{keyPath:'uid'});});};});}

        function parsePresale(row){const u=row.rps12||'';if(!u.includes('住家用'))return null;const p=parseFloat(row.rps21_amountsunitdollars)/10000||0;const up=parseFloat(row.rps22_amountsunitdollars)/10000||0;const r=parseInt(row.rps16_quantity)||0;if(p>10000&&r<=2)return null;if(!p||!up)return null;const date=row.rps07||'';if(!date)return null;const uid=row.rps26||`${row.district}_${date}_${Math.random()}`;return{uid,district:row.district||'',date,price:p,unitPrice:up,rooms:r,project:row.rps27||'未命名',location:row.rps03_area||''};}

        function parseResale(row){const u=row.rps12||'';if(!u.includes('住家用'))return null;const p=parseFloat(row.rps21_amountsunitdollars)/10000||0;const up=parseFloat(row.rps22_amountsunitdollars)/10000||0;const r=parseInt(row.rps16_quantity)||0;const age=parseInt(row.rps18_quantity)||0;if(p>10000&&r<=2)return null;if(!p||!up)return null;const date=row.rps07_yyymmddroc||'';if(!date)return null;const uid=row.rps26||`${row.district}_${date}_${Math.random()}`;return{uid,district:row.district||'',date,price:p,unitPrice:up,rooms:r,age,location:row.rps03_area||''};}

        async function saveToDB(records,type){const tx=db.transaction([type],'readwrite');const store=tx.objectStore(type);let saved=0;for(const rec of records){if(rec){await store.put(rec);saved++;}}console.log(`Saved ${saved} to ${type}`);return saved;}

        async function loadFromDB(type){const tx=db.transaction([type],'readonly');const store=tx.objectStore(type);return new Promise((r,j)=>{const req=store.getAll();req.onsuccess=()=>r(req.result);req.onerror=()=>j(req.error);});}

        async function fetchCSV(url){const resp=await fetch(url);const text=await resp.text();return new Promise((r)=>{Papa.parse(text,{header:true,skipEmptyLines:true,complete:(res)=>r(res.data)});});}

        async function syncData(){try{setStatus('🔄 同步中...');const[p,r]=await Promise.all([fetchCSV(GH_P),fetchCSV(GH_R)]);console.log('Presale rows:',p.length,'Resale rows:',r.length);const pp=p.map(parsePresale).filter(x=>x);const rr=r.map(parseResale).filter(x=>x);console.log('Parsed presale:',pp.length,'Parsed resale:',rr.length);if(pp.length)console.log('Sample presale:',pp[0]);if(rr.length)console.log('Sample resale:',rr[0]);const sp=await saveToDB(pp,'presale');const sr=await saveToDB(rr,'resale');presaleData=await loadFromDB('presale');resaleData=await loadFromDB('resale');console.log('Loaded presale:',presaleData.length,'resale:',resaleData.length);populateFilters();applyFiltersPresale();applyFiltersResale();setStatus(`✅ 預售${sp}/中古${sr}`);}catch(e){console.error(e);setStatus('❌ '+e.message);}}

        document.getElementById('fileInput').addEventListener('change',async(e)=>{const files=e.target.files;for(const file of files){const text=await file.text();const parsed=await new Promise(r=>{Papa.parse(text,{header:true,skipEmptyLines:true,complete:(res)=>r(res.data)});});if(file.name.includes('presale')){const pp=parsed.map(parsePresale).filter(x=>x);const s=await saveToDB(pp,'presale');presaleData=await loadFromDB('presale');setStatus(`✅ 預售${s}`);}else{const rr=parsed.map(parseResale).filter(x=>x);const s=await saveToDB(rr,'resale');resaleData=await loadFromDB('resale');setStatus(`✅ 中古${s}`);}}populateFilters();applyFiltersPresale();applyFiltersResale();e.target.value='';});

        async function clearData(){if(!confirm('確定?'))return;const tx=db.transaction(['presale','resale'],'readwrite');await tx.objectStore('presale').clear();await tx.objectStore('resale').clear();presaleData=[];resaleData=[];populateFilters();applyFiltersPresale();applyFiltersResale();setStatus('✅ 清除');}

        function populateFilters(){const dp=[...new Set(presaleData.map(x=>x.district))].sort();const dr=[...new Set(resaleData.map(x=>x.district))].sort();const proj=[...new Set(presaleData.filter(x=>x.project!=='未命名').map(x=>x.project))].sort();document.getElementById('districtFilterPresale').innerHTML='<option value="">全區域</option>'+dp.map(d=>`<option value="${d}">${d}</option>`).join('');document.getElementById('districtFilterResale').innerHTML='<option value="">全區域</option>'+dr.map(d=>`<option value="${d}">${d}</option>`).join('');document.getElementById('projectFilterPresale').innerHTML='<option value="">全部</option>'+proj.map(p=>`<option value="${p}">${p}</option>`).join('');}

        function switchTab(tab){document.getElementById('contentPresale').style.display=tab==='presale'?'block':'none';document.getElementById('contentResale').style.display=tab==='resale'?'block':'none';document.getElementById('tabPresale').className=tab==='presale'?'px-6 py-3 font-semibold rounded-t-lg bg-indigo-600 text-white':'px-6 py-3 font-semibold rounded-t-lg bg-slate-800 text-gray-400';document.getElementById('tabResale').className=tab==='resale'?'px-6 py-3 font-semibold rounded-t-lg bg-indigo-600 text-white':'px-6 py-3 font-semibold rounded-t-lg bg-slate-800 text-gray-400';}

        function applyFiltersPresale(){const dist=document.getElementById('districtFilterPresale').value;const proj=document.getElementById('projectFilterPresale').value;const room=document.getElementById('roomFilterPresale').value;filteredPresale=presaleData.filter(x=>{if(dist&&x.district!==dist)return false;if(proj&&x.project!==proj)return false;if(room&&x.rooms!=room&&!(room=='4'&&x.rooms>=4))return false;return true;});console.log('Filtered presale:',filteredPresale.length);renderChartsPresale();updateTop5Presale();runAIAnalysisPresale();updateDataInfo();setStatus(`✅ 預售${filteredPresale.length}`);}

        function applyFiltersResale(){const dist=document.getElementById('districtFilterResale').value;const age=document.getElementById('ageFilterResale').value;const room=document.getElementById('roomFilterResale').value;filteredResale=resaleData.filter(x=>{if(dist&&x.district!==dist)return false;if(age&&x.age>parseInt(age))return false;if(room&&x.rooms!=room&&!(room=='4'&&x.rooms>=4))return false;return true;});console.log('Filtered resale:',filteredResale.length);renderChartsResale();updateTop5Resale();runAIAnalysisResale();updateDataInfo();setStatus(`✅ 中古${filteredResale.length}`);}

        function renderChartsPresale(){const dist=document.getElementById('districtFilterPresale').value;document.getElementById('pieChartDivPresale').style.display=dist?'none':'block';document.getElementById('barChartDivPresale').style.display=dist?'none':'block';const md={};filteredPresale.forEach(x=>{const m=x.date.substring(0,6);if(!md[m])md[m]={c:0,s:0};md[m].c++;md[m].s+=x.unitPrice;});const months=Object.keys(md).sort();const ctx1=document.getElementById('volumeChartPresale');if(charts.vp)charts.vp.destroy();charts.vp=new Chart(ctx1,{type:'line',data:{labels:months,datasets:[{label:'量',data:months.map(m=>md[m].c),borderColor:'#818cf8'}]},options:{responsive:true}});const ctx2=document.getElementById('priceChartPresale');if(charts.pp)charts.pp.destroy();charts.pp=new Chart(ctx2,{type:'line',data:{labels:months,datasets:[{label:'價',data:months.map(m=>(md[m].s/md[m].c).toFixed(1)),borderColor:'#f59e0b'}]},options:{responsive:true}});if(!dist){const dv={};filteredPresale.forEach(x=>{dv[x.district]=(dv[x.district]||0)+1;});const s1=Object.entries(dv).sort((a,b)=>b[1]-a[1]).slice(0,10);const ctx3=document.getElementById('pieChartPresale');if(charts.piep)charts.piep.destroy();charts.piep=new Chart(ctx3,{type:'pie',data:{labels:s1.map(x=>x[0]),datasets:[{data:s1.map(x=>x[1]),backgroundColor:['#818cf8','#34d399','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4','#84cc16']}]},options:{responsive:true}});const ds={};filteredPresale.forEach(x=>{if(!ds[x.district])ds[x.district]={s:0,c:0};ds[x.district].s+=x.unitPrice;ds[x.district].c++;});const s2=Object.entries(ds).map(([d,s])=>({d,a:s.s/s.c})).sort((a,b)=>b.a-a.a).slice(0,10);const ctx4=document.getElementById('barChartPresale');if(charts.bp)charts.bp.destroy();charts.bp=new Chart(ctx4,{type:'bar',data:{labels:s2.map(x=>x.d),datasets:[{label:'價',data:s2.map(x=>x.a.toFixed(1)),backgroundColor:'#818cf8'}]},options:{responsive:true}});}}

        function renderChartsResale(){const dist=document.getElementById('districtFilterResale').value;document.getElementById('pieChartDivResale').style.display=dist?'none':'block';document.getElementById('barChartDivResale').style.display=dist?'none':'block';const md={};filteredResale.forEach(x=>{const m=x.date.substring(0,6);if(!md[m])md[m]={c:0,s:0};md[m].c++;md[m].s+=x.unitPrice;});const months=Object.keys(md).sort();const ctx1=document.getElementById('volumeChartResale');if(charts.vr)charts.vr.destroy();charts.vr=new Chart(ctx1,{type:'line',data:{labels:months,datasets:[{label:'量',data:months.map(m=>md[m].c),borderColor:'#34d399'}]},options:{responsive:true}});const ctx2=document.getElementById('priceChartResale');if(charts.pr)charts.pr.destroy();charts.pr=new Chart(ctx2,{type:'line',data:{labels:months,datasets:[{label:'價',data:months.map(m=>(md[m].s/md[m].c).toFixed(1)),borderColor:'#10b981'}]},options:{responsive:true}});if(!dist){const dv={};filteredResale.forEach(x=>{dv[x.district]=(dv[x.district]||0)+1;});const s1=Object.entries(dv).sort((a,b)=>b[1]-a[1]).slice(0,10);const ctx3=document.getElementById('pieChartResale');if(charts.pier)charts.pier.destroy();charts.pier=new Chart(ctx3,{type:'pie',data:{labels:s1.map(x=>x[0]),datasets:[{data:s1.map(x=>x[1]),backgroundColor:['#818cf8','#34d399','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4','#84cc16']}]},options:{responsive:true}});const ds={};filteredResale.forEach(x=>{if(!ds[x.district])ds[x.district]={s:0,c:0};ds[x.district].s+=x.unitPrice;ds[x.district].c++;});const s2=Object.entries(ds).map(([d,s])=>({d,a:s.s/s.c})).sort((a,b)=>b.a-a.a).slice(0,10);const ctx4=document.getElementById('barChartResale');if(charts.br)charts.br.destroy();charts.br=new Chart(ctx4,{type:'bar',data:{labels:s2.map(x=>x.d),datasets:[{label:'價',data:s2.map(x=>x.a.toFixed(1)),backgroundColor:'#34d399'}]},options:{responsive:true}});}}

        function updateTop5Presale(){const sd=document.getElementById('top5StartDatePresale').value.replace('-','');const ed=document.getElementById('top5EndDatePresale').value.replace('-','');const rd=presaleData.filter(x=>{if(sd&&x.date<sd)return false;if(ed&&x.date>ed)return false;return true;});const pv={};rd.filter(x=>x.project!=='未命名').forEach(x=>{pv[x.project]=(pv[x.project]||0)+1;});const t5v=Object.entries(pv).sort((a,b)=>b[1]-a[1]).slice(0,5);document.getElementById('top5PresaleVolume').innerHTML=t5v.map((x,i)=>`<div class="mb-3 p-3 bg-slate-700 rounded-lg"><div class="font-bold">${i+1}. ${x[0]}</div><div class="text-sm text-gray-400">${x[1]}筆</div></div>`).join('')||'<p class="text-gray-500">暫無</p>';const pp={};rd.filter(x=>x.project!=='未命名').forEach(x=>{if(!pp[x.project])pp[x.project]={s:0,c:0,d:x.district};pp[x.project].s+=x.unitPrice;pp[x.project].c++;});const t5p=Object.entries(pp).map(([p,s])=>({p,a:s.s/s.c,d:s.d})).sort((a,b)=>b.a-a.a).slice(0,5);document.getElementById('top5PresalePrice').innerHTML=t5p.map((x,i)=>`<div class="mb-3 p-3 bg-slate-700 rounded-lg"><div class="font-bold">${i+1}. ${x.p}</div><div class="text-sm text-indigo-400">${x.a.toFixed(1)}萬/坪</div><div class="text-xs text-gray-400">${x.d}</div></div>`).join('')||'<p class="text-gray-500">暫無</p>';}

        function updateTop5Resale(){const sd=document.getElementById('top5StartDateResale').value.replace('-','');const ed=document.getElementById('top5EndDateResale').value.replace('-','');const rd=resaleData.filter(x=>{if(sd&&x.date<sd)return false;if(ed&&x.date>ed)return false;return true;});const rv={};rd.forEach(x=>{rv[x.district]=(rv[x.district]||0)+1;});const t5v=Object.entries(rv).sort((a,b)=>b[1]-a[1]).slice(0,5);document.getElementById('top5ResaleVolume').innerHTML=t5v.map((x,i)=>`<div class="mb-3 p-3 bg-slate-700 rounded-lg"><div class="font-bold">${i+1}. ${x[0]}</div><div class="text-sm text-gray-400">${x[1]}筆</div></div>`).join('')||'<p class="text-gray-500">暫無</p>';const rp={};rd.forEach(x=>{const k=x.location||x.district;if(!rp[k])rp[k]={s:0,c:0,d:x.district};rp[k].s+=x.unitPrice;rp[k].c++;});const t5p=Object.entries(rp).filter(([_,s])=>s.c>=2).map(([l,s])=>({l,a:s.s/s.c,d:s.d})).sort((a,b)=>b.a-a.a).slice(0,5);document.getElementById('top5ResalePrice').innerHTML=t5p.map((x,i)=>`<div class="mb-3 p-3 bg-slate-700 rounded-lg"><div class="font-bold text-sm">${i+1}. ${x.l}</div><div class="text-sm text-purple-400">${x.a.toFixed(1)}萬/坪</div><div class="text-xs text-gray-400">${x.d}</div></div>`).join('')||'<p class="text-gray-500">暫無</p>';}

        function runAIAnalysisPresale(){if(!filteredPresale.length){document.getElementById('aiSummaryPresale').innerHTML='📊 暫無數據';document.getElementById('deepAnalysisPresale').innerHTML='';return;}const ap=filteredPresale.reduce((s,x)=>s+x.unitPrice,0)/filteredPresale.length;document.getElementById('aiSummaryPresale').innerHTML=`共<strong>${filteredPresale.length}</strong>筆 ｜ 均價<strong>${ap.toFixed(1)}萬/坪</strong>`;document.getElementById('deepAnalysisPresale').innerHTML=`<p>預售市場呈現${ap>50?'高單價定位':'親民價格帶'}，建議關注周邊交通與生活機能。</p>`;}

        function runAIAnalysisResale(){if(!filteredResale.length){document.getElementById('aiSummaryResale').innerHTML='📊 暫無數據';document.getElementById('deepAnalysisResale').innerHTML='';return;}const ap=filteredResale.reduce((s,x)=>s+x.unitPrice,0)/filteredResale.length;document.getElementById('aiSummaryResale').innerHTML=`共<strong>${filteredResale.length}</strong>筆 ｜ 均價<strong>${ap.toFixed(1)}萬/坪</strong>`;document.getElementById('deepAnalysisResale').innerHTML=`<p>中古市場流通性${filteredResale.length>100?'高':'適中'}，平均單價${ap.toFixed(1)}萬/坪${ap>40?'接近天花板':'具議價空間'}。</p>`;}

        function updateDataInfo(){if(!presaleData.length&&!resaleData.length){document.getElementById('dataInfo').innerHTML='';return;}const all=[...presaleData.map(x=>x.date),...resaleData.map(x=>x.date)].sort();const now=new Date().toLocaleString('zh-TW');document.getElementById('dataInfo').innerHTML=`📅 ${all[0]}~${all[all.length-1]} ｜ 🔄 ${now} ｜ 📊 預售${presaleData.length.toLocaleString()}/中古${resaleData.length.toLocaleString()}`;}

        function setStatus(msg){document.getElementById('status').textContent=msg;}

        (async()=>{db=await initDB();presaleData=await loadFromDB('presale');resaleData=await loadFromDB('resale');console.log('Init: presale',presaleData.length,'resale',resaleData.length);populateFilters();if(!presaleData.length&&!resaleData.length){setStatus('🔄 自動同步...');await syncData();}else{applyFiltersPresale();applyFiltersResale();setStatus('✅ 已載入');}})();
    </script>
</body>
</html>
